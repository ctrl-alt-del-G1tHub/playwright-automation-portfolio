# Flow: Login — Invalid Credentials (Error State)
# App: Sauce Labs My Demo App (Android)
# Package: com.saucelabs.mydemoapp.android
#
# Covers: REQ-M01 — wrong password shows inline error; user stays on login screen

appId: com.saucelabs.mydemoapp.android
---
- launchApp:
    clearState: true

# Navigate to login screen
- tapOn:
    id: "menuIV"

- tapOn:
    text: "Log In"

# Enter wrong password
- tapOn:
    id: "nameET"
- inputText: "bod@example.com"

- tapOn:
    id: "passwordET"
- inputText: "wrongpassword"

- tapOn:
    id: "loginBtn"

# Assert: error message is visible
- assertVisible:
    text: "Username and password do not match any user in this service"

# Assert: still on login screen, not the catalog
- assertNotVisible:
    text: "Products"
